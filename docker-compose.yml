services:
  asima-postgres:
    image: postgres:16-alpine
    container_name: asima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-asima}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-asima}
      POSTGRES_DB: ${DATABASE_NAME:-asima}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - asima-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 10

  asima-minio:
    image: minio/minio
    container_name: asima-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-asima-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-asima-minio-secret}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - asima-miniodata:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/ready || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: wait for MinIO, create the bucket (private), then exit 0.
  asima-minio-init:
    image: minio/mc
    container_name: asima-minio-init
    depends_on:
      asima-minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-asima-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-asima-minio-secret}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-asima}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://asima-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$STORAGE_BUCKET &&
      mc anonymous set none local/$$STORAGE_BUCKET
      "

# NOTE: this stack is dependencies only — Postgres + MinIO. The backend
# itself runs on the HOST via `npm run start:dev` (hot reload) on port 3000.
# `.env` defaults (DATABASE_HOST=localhost, STORAGE_ENDPOINT=http://localhost:9000)
# point the host app at these published container ports.

volumes:
  asima-pgdata:
  asima-miniodata:
