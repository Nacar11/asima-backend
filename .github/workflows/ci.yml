name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, lint, unit test
    runs-on: ubuntu-latest

    # E2E specs require a real Postgres. Service container brings one up
    # on the GitHub runner; unit tests skip it entirely.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: asima
          POSTGRES_PASSWORD: asima
          POSTGRES_DB: asima_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asima -d asima_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      APP_PORT: 3000
      API_PREFIX: api
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_TYPE: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: asima
      DATABASE_PASSWORD: asima
      DATABASE_NAME: asima_test
      DATABASE_SYNCHRONIZE: 'false'
      DATABASE_MAX_CONNECTIONS: '10'
      DATABASE_SSL_ENABLED: 'false'
      AUTH_JWT_SECRET: ci-access-secret-do-not-use-in-prod
      AUTH_JWT_TOKEN_EXPIRES_IN: 15m
      AUTH_REFRESH_SECRET: ci-refresh-secret-do-not-use-in-prod
      AUTH_REFRESH_TOKEN_EXPIRES_IN: 7d
      SEED_DEFAULT_PASSWORD: Asima@1234
      # E2E tests log in repeatedly; the 10/min login throttle would
      # otherwise 429 most of them. Disable throttling for the test run only.
      THROTTLE_DISABLED: 'true'
      # Storage (S3/MinIO). The leave-attachment e2e specs exercise the real
      # S3StorageService against the MinIO container started below — these
      # vars must match the container's root creds + bucket. STORAGE_REGION /
      # BUCKET / ACCESS_KEY / SECRET_KEY are required by storage.config.ts;
      # without them the Nest test app fails to boot and every e2e suite dies.
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: asima
      STORAGE_ACCESS_KEY: asima-minio
      STORAGE_SECRET_KEY: asima-minio-secret
      STORAGE_FORCE_PATH_STYLE: 'true'
      STORAGE_MAX_FILE_MB: '10'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # MinIO (S3-compatible) for the leave-attachment e2e specs. The
      # official minio/minio image needs a `server <dir>` command, which
      # GitHub *service containers* can't supply — so we run it as a plain
      # container here, wait for readiness, and create the bucket with mc
      # (via MC_HOST_* so no alias state is needed). It boots while the
      # static checks + build run; e2e (much later) finds it ready.
      - name: Start MinIO + create bucket
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=asima-minio \
            -e MINIO_ROOT_PASSWORD=asima-minio-secret \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              echo "MinIO ready"; break
            fi
            echo "waiting for MinIO ($i)..."; sleep 2
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://asima-minio:asima-minio-secret@localhost:9000 \
            minio/mc mb --ignore-existing local/asima

      # --- Static checks first (cheapest, fail fastest). lint:ci/format:check
      # are non-mutating (no --fix/--write) so CI verifies rather than rewrites.
      - name: Lint
        run: npm run lint:ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --ci --reporters=default

      - name: Migrate (CI database)
        run: npm run migration:run

      - name: E2E tests
        run: npm run test:e2e -- --ci --reporters=default

      # Informational only: surfaces known-vulnerable deps each run for
      # visibility, but does NOT fail the build — current high findings are
      # transitive/build-time (webpack, lodash, multer via NestJS) with no
      # clean fix. Tighten to a blocking gate after a dependency-upgrade pass.
      - name: Security audit (informational)
        continue-on-error: true
        run: npm audit --audit-level=high
